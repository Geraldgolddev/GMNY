name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  foundation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run build:packages
      - run: npm run build -w @gmny/api
      - run: npm run build -w @gmny/web
      - run: npm run build -w @gmny/admin
