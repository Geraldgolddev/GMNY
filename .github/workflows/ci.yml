name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gmny
          POSTGRES_PASSWORD: gmny
          POSTGRES_DB: gmny_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gmny"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://gmny:gmny@localhost:5432/gmny_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-000000000000000000
      JWT_REFRESH_SECRET: ci-refresh-secret-11111111111111111
      BCRYPT_SALT_ROUNDS: 4

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Apply migrations (test DB)
        run: pnpm --filter @gmny/database db:deploy

      - name: API e2e tests
        run: pnpm --filter @gmny/api test:e2e
